<!-- 
Program 8: Write a program to create an application with different inputs
 such as radio buttons, date picker, numeric, etc., and
  display the entered values right below the form. 
-->
<html>
  <head>
    <title>Student Registration Form</title>

    <style>
      body {
        font-family: Arial;
        background-color: #f0f8ff;
        margin: 30px;
      }
      h2 {
        text-align: center;
        color: darkblue;
      }

      form {
        width: 350px;
        margin: auto;
        padding: 20px;
        background-color: white;
        border: 2px solid lightblue;
        border-radius: 10px;
        box-shadow: 10px;
        box-shadow: 2px 2px 10px gray;
      }
      label {
        font-weight: bold;
        color: darkslategray;
      }

      input[type="text"],
      input[type="date"],
      input[type="number"] {
        width: 95%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 15px;
        border: 1px solid gray;
        border-radius: 5px;
      }
      input[type="radio"] {
        margin-top: 10px;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: darkblue;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
      }
      button:hover {
        background-color: navy;
      }
      #output {
        width: 350px;
        margin: 20px auto;
        padding: 15px;
        background-color: white;
        border: 2px solid darkblue;
        border-radius: 10px;
        box-shadow: 2px 2px 10px gray;
      }
    </style>

    <script>
      function displayData() {
        let name = document.getElementById("name").value;
        let age = document.getElementById("age").value;
        let dob = document.getElementById("dob").value;
        let gender = document.querySelector(
          `input[name="gender"]:checked`,
        ).value;

        document.getElementById("output").innerHTML =
          "<h3>Entered Details</h3>" +
          "Name :" +
          name +
          "<br><br>" +
          "Age: " +
          age +
          "<br><br>" +
          "Date  of Birth : " +
          dob +
          "<br><br>" +
          "Gender : " +
          gender;
      }
    </script>
  </head>
  <body>
    <h2>Student Registration Form</h2>

    <form>
        <label>Name: </label>
        <br>
        <input type="text" id="name">
        
        <label>Age: </label>
        <br>
        <input type="number" id="age">

        <label>Date of Birth: </label>
        <br>
        <input type="date" id="dob">

        <label >Gender:</label>
        <br>
        <input type="radio" name="gender" value="Male">Male
        <input type="radio" name="gender" value="Female">Female
        <br><br>
        <button type="button" onclick="displayData()">
            Submit
        </button>
    </form>
    <div id="output">
        Entered values will be displayed here
    </div>
  </body>
</html>
